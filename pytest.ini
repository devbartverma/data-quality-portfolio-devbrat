[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    bronze: Bronze (raw) layer DQ validation tests — expects known data quality issues
    silver: Silver (cleansed) layer DQ validation tests — all must pass
    gold: Gold (curated) layer DQ validation tests — KPI and aggregation checks
    integration: End-to-end pipeline reconciliation tests across all layers

addopts =
    -v
    --tb=short
    --strict-markers

log_cli = true
log_cli_level = INFO
