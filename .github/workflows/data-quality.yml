name: Data Quality (Python + GE + DBT)

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  python-dq-tests:
    name: Python DQ Validators (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short --junitxml=reports/junit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dq-reports-py${{ matrix.python-version }}
          path: reports/
          retention-days: 14

  ge-suite-check:
    name: Great Expectations Suite Validation
    runs-on: ubuntu-latest
    needs: python-dq-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Validate expectation suite JSON files
        run: |
          python -c "
          import json, glob, sys
          suites = glob.glob('great_expectations/expectations/*.json')
          errors = []
          for path in suites:
              try:
                  suite = json.load(open(path))
                  assert 'expectation_suite_name' in suite
                  assert 'expectations' in suite
                  print(f'  OK  {path} ({len(suite[\"expectations\"])} expectations)')
              except Exception as e:
                  errors.append(path)
                  print(f'FAIL {path}: {e}')
          if errors: sys.exit(1)
          print(f'All {len(suites)} expectation suites valid.')
          "

  dbt-schema-check:
    name: DBT Schema Validation
    runs-on: ubuntu-latest
    needs: python-dq-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-core==1.7.*
      - name: Validate DBT schema YMLs
        run: |
          python -c "
          import yaml, glob, sys
          schemas = glob.glob('dbt/models/**/*.yml', recursive=True)
          errors = []
          for path in schemas:
              try:
                  yaml.safe_load(open(path))
                  print(f'  OK  {path}')
              except Exception as e:
                  errors.append(path); print(f'FAIL {path}: {e}')
          if errors: sys.exit(1)
          print(f'All {len(schemas)} schema files valid.')
          "
      - name: Validate singular test SQL files
        run: |
          python -c "
          import glob, sys
          for f in glob.glob('dbt/tests/**/*.sql', recursive=True):
              content = open(f).read().strip()
              assert content, f'Empty SQL: {f}'
              print(f'  OK  {f}')
          "
