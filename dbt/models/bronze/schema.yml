version: 2

models:
  - name: bronze_suppliers
    description: "Raw supplier master data from ERP_SAP — not yet validated or cleansed"
    columns:
      - name: supplier_id
        description: "Unique supplier identifier from source system"
        tests:
          - not_null
          - unique
      - name: supplier_name
        description: "Supplier legal name — may contain whitespace padding in raw feed"
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ["ACTIVE", "INACTIVE", "PROBATION", "SUSPENDED"]
              config:
                severity: warn    # SUP999 carries LEGACY_SYSTEM — documented (DQ-145)
      - name: payment_terms
        tests:
          - accepted_values:
              values: ["NET30", "NET45", "NET60", "NET90"]
              config:
                severity: warn    # SUP999 has null payment_terms — documented (DQ-145)
      - name: quality_rating
        tests:
          - not_null:
              config:
                severity: warn    # SUP999 has null quality_rating — documented (DQ-145)
      - name: source_system
        tests:
          - not_null
          - accepted_values:
              values: ["ERP_SAP", "LEGACY_SYSTEM", "MDM_PROFISEE", "MANUAL_ENTRY"]

  - name: bronze_parts
    description: "Raw aircraft parts catalog from ERP_SAP"
    columns:
      - name: part_id
        tests:
          - not_null
          - unique
      - name: part_number
        tests:
          - not_null
      - name: part_category
        tests:
          - accepted_values:
              values:
                - AVIONICS
                - PROPULSION
                - AIRFRAME
                - LANDING_GEAR
                - HYDRAULIC
                - ELECTRICAL
                - INTERIOR
                - SAFETY
      - name: unit_of_measure
        tests:
          - accepted_values:
              values: ["EA", "SET", "KIT", "LB", "FT", "IN"]

  - name: bronze_work_orders
    description: "Raw procurement work orders from ERP_SAP"
    columns:
      - name: work_order_id
        tests:
          - not_null
          - unique
      - name: part_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ["OPEN", "CLOSED", "PARTIAL", "CANCELLED"]
