name: aero_parts_pipeline
version: "1.0.0"
config-version: 2

profile: aero_parts_pipeline

model-paths:  ["models"]
test-paths:   ["tests"]
seed-paths:   ["seeds"]
macro-paths:  ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  aero_parts_pipeline:
    bronze:
      +schema: bronze
      +materialized: view
      +tags: ["bronze", "raw"]
    silver:
      +schema: silver
      +materialized: table
      +tags: ["silver", "cleansed"]
    gold:
      +schema: gold
      +materialized: table
      +tags: ["gold", "curated"]

seeds:
  aero_parts_pipeline:
    raw_suppliers:
      +column_types:
        quality_rating: varchar       # SUP999 carries 'INACTIVE' due to missing CSV field
        contract_start_date: varchar  # Mixed formats: ISO, DD/MM/YYYY, -999 sentinel
        phone: varchar
    raw_parts:
      +column_types:
        spec_revision: varchar

vars:
  dq_slack_webhook: "{{ env_var('SLACK_WEBHOOK_URL', '') }}"
  max_null_rate_bronze: 0.10
  max_null_rate_silver: 0.00
